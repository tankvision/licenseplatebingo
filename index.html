<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>License Plate Bingo</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#141A23">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plate Bingo">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Overpass:wght@400;600;700&family=Overpass+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --asphalt:#141A23; --dusk:#1C242F; --edge:#2C3644;
  --blank:#8A939E; --blank-hi:#B4BCC5; --sheeting:#F4F6F1;
  --guide:#17604A; --guide-lit:#2C9A76; --ink:#0E1319; --mute:#7E8895;
  --r-common:#5F6E7E; --r-uncommon:#3E8E7E; --r-rare:#E8A33D; --r-legend:#E2574C;
  --d-common:#2E3742; --d-uncommon:#234840; --d-rare:#453722; --d-legend:#452926;
  --plate:"Archivo",system-ui,sans-serif;
  --sign:"Overpass",system-ui,sans-serif;
  --data:"Overpass Mono",ui-monospace,monospace;
  --pad:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--asphalt);color:var(--sheeting);font-family:var(--sign)}
body{padding:0 var(--pad) calc(28px + env(safe-area-inset-bottom));
  max-width:760px;margin:0 auto;min-height:100vh;
  background-image:radial-gradient(120% 80% at 50% -10%, #1E2836 0%, var(--asphalt) 60%)}

/* Sticky collapsing deck: header + score + map stay pinned and shrink on scroll */
.deck{position:sticky;top:0;z-index:10;
  margin:0 calc(-1 * var(--pad));padding:calc(14px + env(safe-area-inset-top)) var(--pad) 6px;
  background:var(--asphalt);transition:box-shadow .25s ease,background .25s ease}
body.scrolled .deck{box-shadow:0 10px 24px -8px rgba(0,0,0,.7);background:rgba(20,26,35,.96);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
/* title collapses away as you scroll */
.sign{overflow:hidden;transition:max-height .3s ease,opacity .25s ease,margin .3s ease,transform .3s ease;
  max-height:120px}
body.scrolled .sign{max-height:0;opacity:0;margin-top:-4px;transform:translateY(-6px);box-shadow:none}
body.scrolled .sign::after{opacity:0}

.sign{background:var(--guide);border-radius:10px;padding:14px 16px;position:relative;box-shadow:0 6px 22px rgba(0,0,0,.45)}
.sign::after{content:"";position:absolute;inset:5px;border:2px solid rgba(244,246,241,.85);border-radius:6px;pointer-events:none}
.sign h1{margin:0;font-weight:700;font-size:clamp(19px,5.2vw,26px);line-height:1.1;text-transform:uppercase;letter-spacing:.01em}
.sign .sub{margin:5px 0 0;font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,246,241,.7)}

.tally{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:16px 2px 10px;transition:margin .3s ease}
body.scrolled .tally{margin:0 2px 8px}
.stat{display:flex;align-items:baseline;gap:7px}
.stat b{font-family:var(--data);font-weight:700;font-size:26px;letter-spacing:-.02em;display:inline-block}
.stat span{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}
.stat.pts b{color:var(--guide-lit)}
.stat b.bump{animation:bump .35s cubic-bezier(.25,1.5,.4,1)}
@keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.2)}100%{transform:scale(1)}}
.share{margin-left:auto;background:none;border:1.4px solid var(--guide-lit);color:var(--guide-lit);
  font-family:var(--sign);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  padding:9px 15px;border-radius:6px;cursor:pointer;transition:.16s ease}
.share:hover{background:var(--guide);border-color:var(--guide);color:var(--sheeting)}
.share:focus-visible{outline:2px solid var(--sheeting);outline-offset:2px}
.bar{height:5px;border-radius:99px;background:var(--edge);overflow:hidden;margin:0 2px 16px;transition:margin .3s ease}
body.scrolled .bar{margin:0 2px 8px}
.bar i{display:block;height:100%;width:0;background:var(--guide-lit);transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* Map */
.mapbox{position:relative;overflow:hidden;background:var(--dusk);border:1px solid var(--edge);
  border-radius:12px;padding:8px 6px 4px;margin:0 0 8px;
  transition:max-height .32s ease,padding .32s ease,margin .32s ease}
.mapframe{transition:transform .32s ease;transform-origin:top center}
svg.usa{width:100%;height:auto;display:block}
/* compact: map shrinks to a pinned mini-board so the celebration stays in view */
body.scrolled .mapbox{max-height:104px;padding:6px 6px 2px;margin:0}
body.scrolled .mapframe{transform:scale(.46)}
body.scrolled .maplegend{max-height:0;opacity:0;margin:0;overflow:hidden}
body.scrolled .hint{max-height:0;opacity:0;margin:0;overflow:hidden;padding:0}
.maplegend,.hint{transition:max-height .3s ease,opacity .25s ease,margin .3s ease}
.st{fill:var(--df);stroke:#141A23;stroke-width:.9;stroke-linejoin:round;transition:fill .3s ease,filter .3s ease}
.st.on{fill:var(--sheeting);filter:drop-shadow(0 0 4px var(--rc))}
.st.lit{animation:catch .7s ease-out}
@keyframes catch{0%{fill:#fff;filter:drop-shadow(0 0 16px #fff)}100%{}}
.dot{fill:var(--df);stroke:#141A23;stroke-width:1;transition:fill .3s ease,filter .3s ease}
.dot.on{fill:var(--sheeting);filter:drop-shadow(0 0 4px var(--rc))}
/* legendary: the map goes dark and one state burns */
#usa.dim .st{fill:#0A0D12;filter:none;transition:fill .3s ease}
#usa.dim .dot{fill:#0A0D12;filter:none}
#usa.dim .st.burning{fill:#fff;filter:drop-shadow(0 0 20px #fff) drop-shadow(0 0 42px var(--r-legend))}
.maplegend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:6px 0 2px;
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
.maplegend b{display:inline-flex;align-items:center;gap:5px;font-weight:600}
.maplegend i{width:8px;height:8px;border-radius:2px;display:block}
.hint{text-align:center;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin:0 0 8px;max-height:30px}

/* The callout — fixed layer, always on screen no matter the scroll position */
.celebrate{position:fixed;left:0;right:0;z-index:30;pointer-events:none;display:flex;justify-content:center}
.shout{position:absolute;left:50%;top:0;z-index:6;pointer-events:none;text-align:center;
  width:96%;max-width:640px;transform:translate(-50%,-50%)}
.shout .fl{position:absolute;left:50%;top:50%;width:min(94%,420px);aspect-ratio:1;
  transform:translate(-50%,-50%) scale(.2);
  background:radial-gradient(circle,var(--fc) 0%,transparent 62%);
  animation:flare .85s ease-out forwards}
@keyframes flare{0%{transform:translate(-50%,-50%) scale(.2);opacity:.9}
  100%{transform:translate(-50%,-50%) scale(2.3);opacity:0}}
.shout .nm{position:relative;font-family:var(--plate);font-weight:900;text-transform:uppercase;
  letter-spacing:-.01em;line-height:1;color:#fff;white-space:nowrap;
  text-shadow:0 0 18px var(--fc),0 4px 22px rgba(0,0,0,.9);animation:shout var(--dur) ease forwards}
.shout .pt{position:relative;margin-top:6px;font-family:var(--data);font-weight:700;font-size:14px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--fc);
  text-shadow:0 2px 10px rgba(0,0,0,.9);animation:shout var(--dur) ease forwards}
@keyframes shout{
  0%{opacity:0;transform:scale(.5)}
  16%{opacity:1;transform:scale(1.07)}
  26%{transform:scale(1)}
  74%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.09)}
}

/* Lists */
.sectionhead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 2px 8px}
.sectionhead h2{margin:0;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}
.sectionhead span{font-family:var(--data);font-size:11px;color:var(--mute)}
.list{display:flex;flex-direction:column;gap:6px}
.row{display:flex;align-items:center;gap:12px;width:100%;min-height:52px;max-height:120px;overflow:hidden;
  background:var(--dusk);border:1.4px solid var(--edge);border-left:5px solid var(--rc);border-radius:8px;
  padding:10px 14px;cursor:pointer;color:var(--blank-hi);font-family:var(--sign);font-size:15px;font-weight:600;
  text-align:left;transition:background .16s ease,color .16s ease}
.row:focus-visible{outline:2px solid var(--sheeting);outline-offset:2px}
.row .ab{font-family:var(--plate);font-weight:900;font-size:12px;letter-spacing:.04em;color:var(--mute);flex:none;width:34px}
.row .nm{flex:1;min-width:0}
.row .nm em{display:block;font-style:normal;font-family:var(--data);font-size:10.5px;font-weight:400;
  color:var(--mute);letter-spacing:.04em;margin-top:2px}
.row .pt{font-family:var(--data);font-size:12px;font-weight:700;color:var(--rc);flex:none}
.row .tick{flex:none;width:20px;height:20px;border-radius:4px;border:1.6px solid var(--edge);
  display:grid;place-items:center;font-size:12px;color:transparent}
.row.on{background:var(--sheeting);color:var(--ink)}
.row.on .ab{color:#6A7280}
.row.on .nm em{color:#6A7280}
.row.on .tick{background:var(--guide);border-color:var(--guide);color:#fff}
.row.leaving{animation:leave .32s ease-in forwards}
@keyframes leave{to{max-height:0;min-height:0;opacity:0;padding-top:0;padding-bottom:0;
  border-top-width:0;border-bottom-width:0;margin-bottom:-6px;transform:translateX(26px)}}
.row[disabled]{opacity:.35;cursor:not-allowed}
.empty{font-size:13px;color:var(--mute);padding:14px 2px;font-style:italic}
.done{background:var(--guide);border-radius:9px;padding:14px;text-align:center;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;font-size:13px}

/* Sections */
.groups{margin-top:26px;border-top:1px solid var(--edge)}
.grp{border-bottom:1px solid var(--edge)}
.grouphead{display:flex;align-items:center;gap:12px;padding:14px 2px;cursor:pointer}
.chev{flex:none;width:14px;color:var(--mute);transition:transform .2s ease;font-size:11px}
.grouphead[aria-expanded="true"] .chev{transform:rotate(90deg)}
.gtext{flex:1;min-width:0}
.gtext h2{margin:0;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--sheeting)}
.gtext p{margin:3px 0 0;font-family:var(--data);font-size:11px;color:var(--mute)}
.sw{flex:none;width:44px;height:25px;border-radius:99px;background:var(--edge);position:relative;
  transition:background .2s ease;border:0;cursor:pointer;padding:0}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:var(--blank);
  transition:transform .2s cubic-bezier(.2,.8,.2,1),background .2s ease}
.sw[aria-checked="true"]{background:var(--guide)}
.sw[aria-checked="true"]::after{transform:translateX(19px);background:var(--sheeting)}
.sw:focus-visible{outline:2px solid var(--sheeting);outline-offset:2px}
.body{display:none;flex-direction:column;gap:6px;padding:0 0 16px}
.body.show{display:flex}

.foot{display:flex;justify-content:center;margin-top:26px}
.reset{background:none;border:1.4px solid var(--edge);color:var(--mute);font-family:var(--sign);font-size:11px;
  font-weight:600;letter-spacing:.16em;text-transform:uppercase;padding:10px 18px;border-radius:6px;cursor:pointer;transition:.16s ease}
.reset:hover{border-color:var(--r-legend);color:var(--r-legend)}

/* Toast + iOS install nudge */
.snack{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:var(--sheeting);color:var(--ink);font-size:13px;font-weight:600;padding:11px 18px;border-radius:8px;
  box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:20;animation:snack 2.2s ease forwards}
@keyframes snack{0%{opacity:0;transform:translateX(-50%) translateY(12px)}
  12%,80%{opacity:1;transform:translateX(-50%) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.nudge{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:19;
  background:var(--dusk);border:1.4px solid var(--guide-lit);border-radius:10px;padding:13px 14px;
  display:flex;align-items:center;gap:12px;box-shadow:0 10px 34px rgba(0,0,0,.7);max-width:520px;margin:0 auto}
.nudge p{margin:0;flex:1;font-size:12.5px;line-height:1.45;color:var(--blank-hi)}
.nudge b{color:var(--sheeting)}
.nudge button{flex:none;background:none;border:1.4px solid var(--edge);color:var(--mute);border-radius:6px;
  padding:7px 11px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:var(--sign)}

@media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<div class="deck" id="deck">
  <header class="sign">
    <h1>License Plate Bingo</h1>
    <p class="sub">Spot every state</p>
  </header>

  <div class="tally">
    <div class="stat"><b id="found">0</b><span>/ <i id="total">51</i> spotted</span></div>
    <div class="stat pts"><b id="pts">0</b><span>points</span></div>
    <button class="share" id="share">Share</button>
  </div>
  <div class="bar"><i id="fill"></i></div>

  <div class="mapbox" id="mapbox">
    <div class="mapframe" id="mapframe">
      <svg class="usa" id="usa" viewBox="0 0 960 600" role="img" aria-labelledby="usa-t">
        <title id="usa-t">Map of states spotted so far</title>
        <g id="states"></g>
        <circle class="dot" id="dot-DC" r="5"></circle>
      </svg>
    </div>
    <div class="maplegend" id="maplegend"></div>
  </div>
  <p class="hint" id="hint">Dark states are still out there</p>
</div>

<div class="celebrate" id="celebrate" aria-hidden="true"></div>

<div class="sectionhead"><h2>Still Out There</h2><span id="huntcount"></span></div>
<div class="list" id="hunt"></div>

<section class="groups" id="groups"></section>
<div class="foot"><button class="reset" id="reset">Start over</button></div>

let claimed=new Map(Array.isArray(rawC)?rawC.map(c=>[c,null]):Object.entries(rawC));

  store.set('lpb.claimed',JSON.stringify(Object.fromEntries(claimed)));
  store.set('lpb.groups',JSON.stringify([...enabled]));
  store.set('lpb.open',JSON.stringify([...opened]));
};

/* rows */
const rowHTML=(code,withTime)=>{
  const i=INDEX[code], ts=claimed.get(code);
  return `<button class="row" data-code="${code}" style="--rc:${TIER[i.tier].color}">
    <span class="ab">${code}</span>
    <span class="nm">${i.name}${withTime&&ts?`<em>${clock(ts)}</em>`:''}</span>
    <span class="pt">${i.pts}</span><span class="tick">✓</span></button>`;
};
const stateOrder=Object.entries(STATES).map(([c,[n]])=>[c,n])

function renderMap(){
  for(const code of Object.keys(STATES)){
    const on=claimed.has(code);
    document.getElementById('st-'+code).classList.toggle('on',on);
    if(code==='DC') dcDot.classList.toggle('on',on);
  }
}
function totals(){
  let total=51,n=0,score=0;
  for(const gid of enabled) total+=OPTIONAL[gid].items.length;
  for(const c of claimed.keys()) if(live(c)){ n++; score+=INDEX[c].pts; }
  return {total,n,score};
}
function renderStats(bump){
  const {total,n,score}=totals();
  const f=document.getElementById('found'), p=document.getElementById('pts');
  f.textContent=n; p.textContent=score;
  document.getElementById('total').textContent=total;
  document.getElementById('fill').style.width=(n/total*100)+'%';
  if(bump) for(const el of [f,p]){ el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
}

  const score=got.reduce((a,c)=>a+INDEX[c].pts,0);
  document.querySelector('[data-count="spotted"]').textContent =
    got.length?`${got.length} plates · ${score} pts`:'Nothing yet';
  document.querySelector('[data-body="spotted"]').innerHTML =
    got.length?got.map(c=>rowHTML(c,true)).join('')
    :`<div class="empty">Your finds will collect here.</div>`;
  document.querySelectorAll('[data-body="spotted"] .row').forEach(r=>r.classList.add('on'));

  document.querySelectorAll('.body').forEach(b=>b.classList.toggle('show',opened.has(b.dataset.body)));
  document.querySelectorAll('.grouphead').forEach(h=>h.setAttribute('aria-expanded',opened.has(h.dataset.g)));
  document.querySelectorAll('.sw').forEach(s=>s.setAttribute('aria-checked',enabled.has(s.dataset.sw)));
}
function render(bump){ renderMap(); renderStats(bump); renderLists(); save(); }

/* ── the callout, scaled to rarity ── */
const SHOUT={
  common:  {text:false, flare:false, burn:false, dur:0},
  uncommon:{text:true,  flare:false, burn:false, dur:1250},
  rare:    {text:true,  flare:true,  burn:false, dur:1750},
  legend:  {text:true,  flare:true,  burn:true,  dur:2250}
};
const celebrate=document.getElementById('celebrate');
function shout(code){
  const i=INDEX[code], cfg=SHOUT[i.tier];
  if(!cfg.text) return;
  celebrate.innerHTML='';
  // anchor the layer over wherever the map is right now (full or collapsed)
  const r=document.getElementById('mapbox').getBoundingClientRect();
  celebrate.style.top=Math.max(r.top+r.height/2,64)+'px';
  const name=i.name.toUpperCase();
  const size=Math.min(46,Math.max(19,470/Math.max(name.length,6)));
  const el=document.createElement('div');
  el.className='shout';
  el.style.setProperty('--fc',TIER[i.tier].color);
  el.style.setProperty('--dur',cfg.dur+'ms');
  el.innerHTML=(cfg.flare?`<div class="fl"></div>`:'')+
    `<div class="nm" style="font-size:${size.toFixed(1)}px">${name}</div>
     <div class="pt">+${i.pts} · ${TIER[i.tier].label}</div>`;
  celebrate.appendChild(el);
  setTimeout(()=>{ if(el.parentNode===celebrate) celebrate.innerHTML=''; },cfg.dur+80);
}
function burn(code){
  const el=document.getElementById('st-'+code);
  if(!el) return;
  el.classList.add('burning');
  el.parentNode.appendChild(el);
  usa.classList.add('dim');
  setTimeout(()=>{ usa.classList.remove('dim'); el.classList.remove('burning'); },1050);
}

function toggle(code){
  if(claimed.has(code)){ claimed.delete(code); render(false); return; }
  const tier=INDEX[code].tier;
  claimed.set(code,Date.now());
  renderMap(); renderStats(true); save();
  shout(code);

  if(STATES[code]){
    if(SHOUT[tier].burn) burn(code);
    else{
      const el=document.getElementById('st-'+code);
      el.classList.remove('lit'); void el.getBBox(); el.classList.add('lit');
      el.parentNode.appendChild(el);
      setTimeout(()=>el.classList.remove('lit'),700);
    }
  }
  const row=document.querySelector(`#hunt [data-code="${code}"], .body:not([data-body="spotted"]) [data-code="${code}"]`);
  if(row){
    row.classList.add('on');
    setTimeout(()=>row.classList.add('leaving'),400);
    setTimeout(()=>renderLists(),740);
  } else renderLists();
}

/* ── share ── */
function snack(msg){
  const el=document.createElement('div');
  el.className='snack'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2300);
}
function buildShare(){
  const {total,n,score}=totals();
  const pool=Object.keys(INDEX).filter(live);
  const lines=['🚗 LICENSE PLATE BINGO',`${score} pts · ${n}/${total}`,''];
  for(const k of ORDER){
    const set=pool.filter(c=>INDEX[c].tier===k);
    if(!set.length) continue;
    const got=set.filter(c=>claimed.has(c)).length;
    const filled=Math.round(got/set.length*10);
    lines.push(TIER[k].emoji.repeat(filled)+'⬛'.repeat(10-filled)+` ${TIER[k].label.toLowerCase()} ${got}/${set.length}`);
  }
  const left=pool.filter(c=>!claimed.has(c))
    .sort((a,b)=>INDEX[b].pts-INDEX[a].pts).slice(0,6);
  if(left.length){ lines.push(''); lines.push('Still hunting: '+left.join(', ')); }
  lines.push('');
  lines.push(location.origin+location.pathname);
  return lines.join('\n');
}
document.getElementById('share').addEventListener('click',async()=>{
  const text=buildShare();
  try{
    if(navigator.share){ await navigator.share({text}); return; }
    await navigator.clipboard.writeText(text);
    snack('Score copied');
  }catch(e){ if(e && e.name!=='AbortError') snack('Could not share'); }
});

/* ── events ── */
document.body.addEventListener('click',e=>{
  const sw=e.target.closest('.sw');
  if(sw){ e.stopPropagation(); const gid=sw.dataset.sw;
    enabled.has(gid)?enabled.delete(gid):enabled.add(gid);
    if(!enabled.has(gid)) opened.delete(gid);
    render(false); return; }
  const head=e.target.closest('.grouphead');
  if(head){ const gid=head.dataset.g; opened.has(gid)?opened.delete(gid):opened.add(gid); renderLists(); return; }
  const row=e.target.closest('.row');
  if(row && !row.disabled) toggle(row.dataset.code);
});
document.getElementById('groups').addEventListener('keydown',e=>{
  const head=e.target.closest('.grouphead');
  if(head&&e.target===head&&(e.key==='Enter'||e.key===' ')){
    e.preventDefault(); const gid=head.dataset.g;
    opened.has(gid)?opened.delete(gid):opened.add(gid); renderLists(); }
});
document.getElementById('reset').addEventListener('click',()=>{
  if(confirm('Clear every plate and start a new game?')){ claimed.clear(); render(false); }
});

/* ── iOS install nudge ── */
(function(){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const installed=navigator.standalone===true||matchMedia('(display-mode: standalone)').matches;
  if(!isIOS||installed||store.get('lpb.nudged')) return;
  const el=document.createElement('div');
  el.className='nudge';
  el.innerHTML=`<p><b>Play offline.</b> Tap Share, then <b>Add to Home Screen</b> — plates don't wait for signal.</p>
    <button type="button">Got it</button>`;
  el.querySelector('button').addEventListener('click',()=>{ store.set('lpb.nudged','1'); el.remove(); });
  setTimeout(()=>document.body.appendChild(el),1400);
})();

/* ── collapse the deck on scroll, with a dead zone so it doesn't flicker ── */
(function(){
  let compact=false, ticking=false;
  function apply(){
    const y=window.scrollY||window.pageYOffset||0;
    if(!compact && y>52){ compact=true; document.body.classList.add('scrolled'); }
    else if(compact && y<16){ compact=false; document.body.classList.remove('scrolled'); }
    ticking=false;
  }
  window.addEventListener('scroll',()=>{
    if(!ticking){ ticking=true; requestAnimationFrame(apply); }
  },{passive:true});
  apply();
})();

/* ── service worker: register, and auto-reload once when a new one takes over ── */
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing) return; refreshing=true; location.reload();
  });
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}

render(false);
</script>
